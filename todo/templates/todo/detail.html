{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>{{ task.title }} | ToDoアプリ</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <main class="page-container page-container-narrow">
      <a class="back-link" href="{% url 'index' %}"><span aria-hidden="true">←</span> タスク一覧へ戻る</a>
      <article class="panel detail-panel">
        <div class="detail-heading">
          <div>
            <p class="eyebrow">タスク詳細</p>
            <h1>{{ task.title }}</h1>
          </div>
          {% if task.completed %}
          <span class="status status-completed">完了</span>
          {% else %}
          <span class="status status-open">未完了</span>
          {% endif %}
        </div>
        <dl class="detail-list">
          <div>
            <dt>登録日時</dt>
            <dd>{{ task.posted_at }}</dd>
          </div>
          {% if task.due_at %}
          <div>
            <dt>期限</dt>
            <dd>{{ task.due_at }}</dd>
          </div>
          {% endif %}
        </dl>
        <div class="button-group">
          {% if not task.completed %}
          <a class="button button-primary" href="{% url 'close' task.id %}">完了にする</a>
          {% endif %}
          <a class="button button-secondary" href="{% url 'update' task.id %}">編集する</a>
          <a class="button button-danger" href="{% url 'delete' task.id %}">削除する</a>
        </div>
      </article>
    </main>
  </body>

</html>
