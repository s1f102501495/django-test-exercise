{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>タスクを編集 | ToDoアプリ</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <main class="page-container page-container-narrow">
      <a class="back-link" href="{% url 'detail' task.id %}"><span aria-hidden="true">←</span> 詳細へ戻る</a>
      <section class="panel">
        <header class="form-header">
          <p class="eyebrow">タスク編集</p>
          <h1>タスクを編集</h1>
          <p class="page-description">タイトルや期限を変更できます。</p>
        </header>
        <form class="task-form" action="{% url 'update' task.id %}" method="post">
          {% csrf_token %}
          <div class="form-group">
            <label for="titleInput">タイトル</label>
            <input id="titleInput" name="title" type="text" maxlength="100" placeholder="タスクのタイトル" value="{{ task.title }}">
          </div>
          <div class="form-group">
            <label for="dueInput">期限（任意）</label>
            <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at|date:'Y-m-d\\TH:i' }}">
          </div>
          <div class="form-actions form-actions-split">
            <a class="button button-secondary" href="{% url 'detail' task.id %}">キャンセル</a>
            <button class="button button-primary" type="submit">変更を保存</button>
          </div>
        </form>
      </section>
    </main>
  </body>

</html>
